# Workflow-only agent for research steps. Isolated from researcher-hand to avoid
# shared quota and session bloat. Use this in cron/workflow steps that need research.
name = "research-pipeline-runner"
version = "0.1.0"
description = "Workflow-only research agent for pipeline steps (no continuous session)."
author = "openfang"
module = "builtin:chat"
tags = ["workflow", "research", "pipeline"]

[model]
provider = "default"
model = "default"
api_key_env = "GEMINI_API_KEY"
max_tokens = 8192
temperature = 0.5
system_prompt = """You are a research step in a workflow pipeline. You receive a single task (e.g. research a topic, gather sources) and produce a concise, well-structured output for the next step.

Do one focused research pass: decompose the question, use web_search and web_fetch, synthesize findings with citations. Output a clear report or summary suitable for the next pipeline step. Do not carry over context from other runs — each invocation is independent."""

[[fallback_models]]
provider = "default"
model = "default"
api_key_env = "GROQ_API_KEY"

[resources]
max_llm_tokens_per_hour = 500000

[capabilities]
tools = ["web_search", "web_fetch", "file_read", "file_write", "file_list", "memory_store", "memory_recall"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
